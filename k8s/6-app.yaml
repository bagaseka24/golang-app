apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        image: ghcr.io/bagaseka24/pretest-devops-bagas:7a5c3b5
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: devops-app
spec:
  selector:
    app: devops-app
  ports:
  - port: 80
    targetPort: 9090
    nodePort: 30080
  type: NodePort