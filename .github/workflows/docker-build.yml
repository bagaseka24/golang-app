name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      

      - name: Get short SHA
        id: sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.SHORT_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
          
       
      - name: Update Kubernetes manifest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITOPS_REPO: devops-app-gitops
        run: |
          # Clone GitOps repo
          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository_owner }}/${GITOPS_REPO}.git
          cd ${GITOPS_REPO}
          
          # Debug: Show current content
          echo "Before update:"
          grep "image:" k8s/6-app.yaml
          
          # Update image tag in manifest (use SHORT SHA)
          SHORT_SHA=${{ steps.sha.outputs.SHORT_SHA }}
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${SHORT_SHA}|g" k8s/6-app.yaml
          
          # Debug: Show updated content
          echo "After update:"
          grep "image:" k8s/6-app.yaml
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/6-app.yaml
          git commit -m "Update image to ${SHORT_SHA}" || echo "No changes"
          git push
